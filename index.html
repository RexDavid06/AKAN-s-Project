<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Strength Checker</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Password Strength Checker</h1>

      <div class="input-group">
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />

          <button id="toggle-btn">Show</button>
        </div>

        <button id="copy-btn">⧉</button>
      </div>

      <div class="strength-container">
        <div class="strength-bar" id="strength-bar"></div>
      </div>

      <p id="strength-text">Strength: None</p>

      <div class="requirements">
        <p id="length">✖ Minimum 8 characters</p>

        <p id="uppercase">✖ Uppercase letter</p>

        <p id="lowercase">✖ Lowercase letter</p>

        <p id="number">✖ Number</p>

        <p id="special">✖ Special character</p>
      </div>

      <div class="tips">
        <h3>Security Tips</h3>

        <ul>
          <li>Avoid using your name</li>
          <li>Do not use common passwords</li>
          <li>Use symbols and numbers</li>
          <li>Make passwords longer</li>
        </ul>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
