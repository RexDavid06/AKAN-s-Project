<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Created Successfully</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="page-icon success">🛡️</div>

      <h1>Password Created Successfully</h1>

      <p class="intro">
        Congratulations!

        <br /><br />

        Welcome,

        <strong id="user-name"></strong>

        <br /><br />

        Your password has been securely saved for this demonstration.

        <br /><br />

        Remember to keep your password private and never share it.
      </p>

      <a href="landing.html">
        <button id="register-btn">Return Home</button>
      </a>
    </div>
  </body>

  <script>
    const user = JSON.parse(localStorage.getItem("currentUser"));

    if (user) {
      document.getElementById("user-name").textContent = user.fullname;
    }
  </script>
</html>
