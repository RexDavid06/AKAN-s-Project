<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Created Successfully</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <div class="page-icon success">🛡️</div>

      <h1>Password Created Successfully</h1>

      <p class="intro">
        Congratulations!

        <br /><br />

        Welcome,

        <strong id="user-name"></strong>

        <br /><br />

        Your password has been successfully analyzed, validated, and securely
        saved for this demonstration.

        <br /><br />

        Remember to keep your password private and never share it with anyone.
      </p>

      <button id="register-btn" onclick="goHome()">
        Return Home
      </button>
    </div>

    <script>
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if (user) {
        document.getElementById("user-name").textContent = user.fullname;
      }

      function goHome() {
        // Remove only the current logged-in user
        localStorage.removeItem("currentUser");

        // Return to the landing page
        window.location.href = "landing.html";
      }
    </script>
  </body>
</html>
